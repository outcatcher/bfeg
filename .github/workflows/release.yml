name: Release

on:
  push:
    tags:
      - "v[0-9].[0-9]+.[0-9]+"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Build (release)
        run: cargo build --release --verbose
      - uses: softprops/action-gh-release@v2
        with:
          files: target/release/bfeg*
